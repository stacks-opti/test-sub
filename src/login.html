<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FiveM Optimizer Pro — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;}
:root{--bg:#080808;--card:#111;--r:#e0222a;--r2:#ff3c44;--rf:rgba(224,34,42,.08);--text:#e8e8e8;--m:#444;--m2:#666;--b:#1c1c1c;--b2:#222;}
html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}

/* drag region */
#drag{position:fixed;top:0;left:0;right:0;height:40px;-webkit-app-region:drag;z-index:10;}
#close{position:fixed;top:10px;right:14px;-webkit-app-region:no-drag;z-index:20;width:22px;height:22px;border-radius:5px;border:1px solid var(--b);background:transparent;color:var(--m2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
#close:hover{background:var(--r);color:#fff;border-color:var(--r);}

/* layout */
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:32px;}

/* logo */
.logo{margin-bottom:28px;text-align:center;}
.logo svg{width:52px;height:52px;margin-bottom:10px;}
.logo-title{font-size:20px;font-weight:700;color:var(--text);}
.logo-sub{font-size:11px;color:var(--m2);margin-top:3px;}

/* card */
.card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--b);border-radius:12px;padding:24px;}

.section-label{font-size:9px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}

/* HWID box */
.hwid-box{display:none;background:var(--bg);border:1px solid var(--b2);border-radius:8px;padding:11px 13px;margin-bottom:16px;}
.hwid-label{font-size:10px;color:var(--m2);margin-bottom:5px;}
.hwid-val{font-family:Consolas,monospace;font-size:12px;color:var(--text);word-break:break-all;letter-spacing:.5px;line-height:1.5;}
.hwid-host{font-size:10px;color:var(--m);margin-top:4px;}

/* copy btn */
.copy-btn{display:none;width:100%;padding:8px;border:1px solid var(--b2);border-radius:7px;background:transparent;color:var(--m2);font-size:11px;cursor:pointer;transition:all .12s;margin-bottom:16px;align-items:center;justify-content:center;gap:6px;}
.copy-btn:hover{background:var(--b2);color:var(--text);}
.copy-btn.copied{border-color:var(--r);color:var(--r2);}

/* divider */
.divider{display:none;height:1px;background:var(--b);margin:0 0 16px;}

/* login button */
.login-btn{width:100%;padding:13px;border-radius:9px;border:1px solid var(--r);background:var(--rf);color:var(--r2);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.login-btn:hover{background:rgba(224,34,42,.16);}
.login-btn:active{transform:scale(.99);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-dot{width:7px;height:7px;border-radius:50%;background:var(--r2);box-shadow:0 0 0 0 rgba(224,34,42,.4);animation:rp 2s infinite;}
@keyframes rp{0%{box-shadow:0 0 0 0 rgba(224,34,42,.4)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

/* spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(224,34,42,.3);border-top-color:var(--r2);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* status */
.status{margin-top:14px;border-radius:8px;padding:11px 13px;font-size:11px;line-height:1.6;display:none;}
.status.show{display:block;}
.status.error{background:rgba(224,34,42,.07);border:1px solid rgba(224,34,42,.2);color:#ff8888;}
.status.success{background:rgba(0,200,80,.07);border:1px solid rgba(0,200,80,.2);color:#00c850;}
.status.warn{background:rgba(255,140,0,.07);border:1px solid rgba(255,140,0,.2);color:#ff8c00;}
.status-title{font-weight:700;margin-bottom:4px;font-size:12px;}

/* footer */
.footer{margin-top:20px;font-size:10px;color:var(--m);text-align:center;line-height:1.7;}

/* scan animation */
.scan-line{height:2px;background:linear-gradient(90deg,transparent,var(--r),transparent);border-radius:1px;animation:scan 1.5s ease-in-out infinite;margin:8px 0;}
@keyframes scan{0%{opacity:0;transform:scaleX(0)}50%{opacity:1;transform:scaleX(1)}100%{opacity:0;transform:scaleX(0)}}
</style>
</head>

    <div class="logo-title">FiveM Optimizer Pro</div>
    <div class="logo-sub">Discord Role Access</div>
  </div>

  <div class="card">
    <div class="section-label">Discord Access</div>
    <div class="section-label">Access</div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <div class="btn-dot"></div>
      Login with Discord
    </button>

    <div class="status" id="status-box">
      <div class="status-title" id="status-title"></div>
      <div id="status-msg"></div>
    </div>
  </div>

  <div class="footer">
    Sign in with Discord. Access is granted only to approved server roles.
  </div>
</div>

<script>
const { ipcRenderer } = require('electron')
async function init() {
  document.getElementById('status-box').className = 'status'
}

function setStatus(type, title, msg) {
  const box = document.getElementById('status-box')
  box.className = 'status show ' + type
  document.getElementById('status-title').textContent = title
  document.getElementById('status-msg').textContent = msg
}

async function doLogin() {
  const btn = document.getElementById('login-btn')
  btn.disabled = true
  btn.innerHTML = '<div class="spin"></div> Opening Discord...'
  document.getElementById('status-box').className = 'status'

  const r = await ipcRenderer.invoke('login-attempt')

  if (r.ok) {
    btn.innerHTML = '<span style="color:var(--green)">&#10003;</span> Authorized!'
    setStatus('success', 'Access Granted', 'Discord role verified. Loading optimizer...')
    setTimeout(() => ipcRenderer.send('login-success'), 1200)
    return
  }

  // Failed
  btn.disabled = false
  btn.innerHTML = '<div class="btn-dot"></div> Login with Discord'

  if (r.state === 'missing-role') {
    setStatus('error', 'Not Authorized',
      'Your Discord account does not have one of the allowed optimizer roles.')
  } else if (r.state === 'not-member') {
    setStatus('error', 'Server Required',
      'Join the required Discord server, then try again.')
  } else if (r.state === 'cancelled') {
    setStatus('warn', 'Login Cancelled',
      'Discord login was cancelled.')
  } else {
    setStatus('error', 'Discord Login Failed', r.msg || 'Could not verify your Discord access. Try again.')
  }
}

init()
</script>
